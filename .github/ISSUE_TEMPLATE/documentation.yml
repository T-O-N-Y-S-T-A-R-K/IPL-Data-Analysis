name: 📝 Documentation
description: Suggest improvements to docs or README
labels: ["documentation"]
body:
  - type: dropdown
    id: doc_type
    attributes:
      label: Which section needs improvement?
      options:
        - README
        - Code Comments
        - Setup Instructions
        - Analysis Explanation
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's missing or unclear?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Your Suggestion
      placeholder: It would be clearer if...