name: 📊 Data Issue
description: Report incorrect or missing IPL data
labels: ["data", "needs-review"]
body:
  - type: dropdown
    id: data_type
    attributes:
      label: What type of data is wrong?
      options:
        - Match Results
        - Player Stats
        - Team Info
        - Season Data
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is the data? (file/column name)
      placeholder: e.g. matches.csv → winner column

  - type: textarea
    id: description
    attributes:
      label: Describe the Issue
      placeholder: What is wrong and what should it be?
    validations:
      required: true